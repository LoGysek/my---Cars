<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Autá</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e9e9e9;
            margin: 0;
            padding: 20px;
        }
        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
        }
        .container {
            max-width: 1100px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .car {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .car:hover {
            transform: scale(1.05);
            background: #f5f5f5;
        }
        img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 2px;
        }
        .name {
            font-size: 20px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>

    <script>
        function openCar(name, img, text) {
            let win = window.open("", "_blank", "width=1700,height=1600");
            win.document.write(`
                <html>
                <head>
                    <title>${name}</title>
                    <style>
                        body { font-family: Arial; padding: 20px; }
                        img { width: 900px; border-radius: 30px; }
                        a { font-size: 20px; }
                    </style>
                </head>
                <body>
                    <h1>${name}</h1>
                    <img src="${img}">
                    <p style="font-size: 40px;">${text}</p>
                    <a href="#" onclick="window.close()">Zavrieť okno</a>
                </body>
                </html>
            `);
        }
    </script>
</head>
